name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @cast-loop/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Format check
        run: pnpm format:check
        continue-on-error: true

      - name: Test API
        run: pnpm --filter @cast-loop/api test

      - name: Build apps
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
